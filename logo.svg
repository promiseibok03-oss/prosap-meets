<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow filter for animation -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Linear gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1428;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue glow gradient -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0" />
    </radialGradient>
    
    <!-- Animation -->
    <style>
      @keyframes pulse {
        0%, 100% {
          filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
        }
        50% {
          filter: drop-shadow(0 0 20px rgba(0, 212, 255, 1));
        }
      }
      
      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      
      .logo-group {
        animation: float 3s ease-in-out infinite;
      }
      
      .glow-circle {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Outer glow circles -->
  <circle cx="200" cy="200" r="160" fill="url(#blueGlow)" opacity="0.3"/>
  
  <g class="logo-group">
    <!-- Glowing background circle -->
    <circle cx="200" cy="200" r="140" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="130" fill="none" stroke="#0099ff" stroke-width="1" opacity="0.3"/>
    
    <!-- Main logo shape - chat bubbles forming a P -->
    <g class="glow-circle" filter="url(#strongGlow)">
      <!-- Left chat bubble (P) -->
      <circle cx="130" cy="160" r="50" fill="none" stroke="#00d4ff" stroke-width="3"/>
      <circle cx="130" cy="240" r="45" fill="none" stroke="#0099ff" stroke-width="3"/>
      
      <!-- Right chat bubble (M) -->
      <circle cx="270" cy="170" r="55" fill="none" stroke="#00d4ff" stroke-width="3"/>
      <circle cx="270" cy="250" r="50" fill="none" stroke="#0099ff" stroke-width="3"/>
      
      <!-- Center connection line -->
      <line x1="165" y1="200" x2="235" y2="200" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
      
      <!-- Decorative dots -->
      <circle cx="110" cy="120" r="5" fill="#00d4ff" opacity="0.8"/>
      <circle cx="290" cy="130" r="5" fill="#0099ff" opacity="0.8"/>
      <circle cx="120" cy="300" r="5" fill="#0099ff" opacity="0.8"/>
      <circle cx="280" cy="310" r="5" fill="#00d4ff" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Text: Prosap Meets -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#00d4ff" filter="url(#glow)">
    PROSAP MEETS
  </text>
</svg>